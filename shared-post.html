<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>分享测试</title>
  <meta name="description" content="用于直达分享">
  <style>
    :root {
      --bg: #f6efe7;
      --panel: rgba(255, 250, 245, 0.92);
      --text: #2f221c;
      --soft: #725f54;
      --accent: #cc6840;
      --line: rgba(86, 51, 31, 0.12);
      --shadow: 0 24px 80px rgba(84, 47, 26, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 215, 182, 0.7), transparent 28%),
        radial-gradient(circle at right 15%, rgba(224, 120, 84, 0.24), transparent 30%),
        var(--bg);
    }

    .shell {
      max-width: 920px;
      margin: 0 auto;
      padding: 40px 18px 72px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .hero,
    .share {
      padding: 28px;
      margin-bottom: 24px;
    }

    .eyebrow {
      margin: 0 0 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--soft);
      font-size: 12px;
    }

    h1,
    h2,
    p {
      margin-top: 0;
    }

    .meta,
    .summary,
    .copy {
      color: var(--soft);
      line-height: 1.75;
    }

    .content {
      line-height: 1.9;
      font-size: 18px;
    }

    .share-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 240px;
      gap: 18px;
      align-items: center;
    }

    .link-box {
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid var(--line);
      word-break: break-all;
      margin-bottom: 14px;
    }

    .link-box a {
      color: var(--accent);
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    button,
    .btn-link {
      border: 0;
      border-radius: 16px;
      padding: 12px 18px;
      cursor: pointer;
      font: inherit;
      text-decoration: none;
    }

    .primary {
      background: var(--accent);
      color: #fffaf5;
    }

    .secondary {
      background: rgba(255, 255, 255, 0.76);
      color: var(--text);
    }

    .qr-panel {
      padding: 14px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.62);
      border: 1px solid var(--line);
      text-align: center;
    }

    .qr-panel img {
      width: 100%;
      max-width: 210px;
      border-radius: 18px;
      background: #fff;
      padding: 10px;
    }

    @media (max-width: 760px) {
      .share-grid {
        grid-template-columns: 1fr;
      }

      .hero,
      .share {
        padding: 22px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <article class="card hero">
      <p class="eyebrow">Shared Blog</p>
      <h1>分享测试</h1>
      <p class="meta">发布时间：2026-03-24</p>
      <p class="summary">用于直达分享</p>
      <div class="content">
        <p>公开文章内容</p>
      </div>
    </article>

    <section class="card share">
      <p class="eyebrow">Share</p>
      <h2>链接与二维码</h2>
      <div class="share-grid">
        <div>
          <div class="link-box">
            文章链接：
            <a id="post-link" href="https://infantile-yq.github.io/memory-blog/shared-post.html" target="_blank" rel="noreferrer">
              https://infantile-yq.github.io/memory-blog/shared-post.html
            </a>
          </div>
          <div class="actions">
            <button class="primary" id="copy-link-btn" type="button">复制链接</button>
            <a class="btn-link secondary" id="download-qr-btn" href="https://api.qrserver.com/v1/create-qr-code/?size=1200x1200&data=https%3A%2F%2Finfantile-yq.github.io%2Fmemory-blog%2Fshared-post.html" download="shared-post-qr.png">下载二维码</a>
          </div>
          <p class="copy">把上面的链接或二维码发出去即可。GitHub Pages 开启后，这个页面不需要你本机继续运行。</p>
        </div>
        <div class="qr-panel">
          <img src="https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=https%3A%2F%2Finfantile-yq.github.io%2Fmemory-blog%2Fshared-post.html" alt="文章二维码">
          <p class="copy">扫码直达这篇博客</p>
        </div>
      </div>
    </section>
  </main>

  <script>
    document.getElementById("copy-link-btn").addEventListener("click", async () => {
      const link = document.getElementById("post-link").href;
      try {
        await navigator.clipboard.writeText(link);
        alert("文章链接已复制");
      } catch (error) {
        window.prompt("复制下面的链接", link);
      }
    });
  </script>
</body>
</html>
