version: "3.9"

services:
  memory-blog:
    build: .
    container_name: memory-blog
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      BLOG_DATA_DIR: /app/data
    ports:
      - "8000:8000"
    volumes:
      - memory_blog_data:/app/data

volumes:
  memory_blog_data:
